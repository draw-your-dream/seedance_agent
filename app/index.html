<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>小蘑菇秃秃</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; font-family:-apple-system,"PingFang SC",sans-serif; background:#000; color:#fff; }

/* 底部Tab */
.tabs { position:fixed; bottom:0; left:0; right:0; display:flex; background:rgba(0,0,0,0.95); border-top:1px solid #222; padding:8px 0 env(safe-area-inset-bottom); z-index:100; }
.tab { flex:1; text-align:center; padding:6px 0; font-size:11px; color:#666; cursor:pointer; }
.tab.active { color:#fff; }
.tab-icon { font-size:20px; display:block; margin-bottom:2px; }

/* 页面容器 */
.page { position:fixed; top:0; left:0; right:0; bottom:56px; display:none; }
.page.active { display:flex; flex-direction:column; }

/* ===== Feed页 ===== */
#feed-page { background:#000; }
.feed-scroll { flex:1; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
.feed-card { height:100%; scroll-snap-align:start; position:relative; display:flex; flex-direction:column; }
.feed-video-wrap { flex:1; position:relative; background:#000; display:flex; align-items:center; justify-content:center; }
.feed-video-wrap video { width:100%; height:100%; object-fit:contain; }
.feed-info { position:absolute; bottom:0; left:0; right:0; padding:16px 16px 20px; background:linear-gradient(transparent, rgba(0,0,0,0.8)); }
.feed-time { font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:4px; }
.feed-title { font-size:15px; font-weight:600; margin-bottom:6px; }
.feed-voice { font-size:13px; color:rgba(255,255,255,0.75); line-height:1.5; }
.feed-voice::before { content:"💭 "; }
.feed-badge { position:absolute; top:12px; left:12px; font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(99,102,241,0.8); }
.feed-badge.user { background:rgba(251,191,36,0.8); color:#000; }
.feed-generating { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#666; gap:12px; }
.feed-generating .spinner { width:32px; height:32px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.feed-empty { height:100%; display:flex; align-items:center; justify-content:center; color:#555; font-size:14px; }

/* 顶部标题 */
.feed-header { position:absolute; top:0; left:0; right:0; padding:env(safe-area-inset-top) 16px 0; z-index:10; background:linear-gradient(rgba(0,0,0,0.6), transparent); }
.feed-header h1 { font-size:16px; font-weight:600; padding:12px 0; }

/* ===== Chat页 ===== */
#chat-page { background:#0a0a0a; }
.chat-header { padding:env(safe-area-inset-top) 16px 0; border-bottom:1px solid #1a1a1a; background:#0a0a0a; }
.chat-header h2 { font-size:16px; font-weight:600; padding:12px 0; text-align:center; }
.chat-body { flex:1; overflow-y:auto; padding:16px; -webkit-overflow-scrolling:touch; }
.chat-msg { margin-bottom:12px; max-width:80%; }
.chat-msg.user { margin-left:auto; }
.chat-msg .bubble { padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5; }
.chat-msg.user .bubble { background:#2563eb; border-bottom-right-radius:4px; }
.chat-msg.tutu .bubble { background:#1a1a1a; border:1px solid #2a2a2a; border-bottom-left-radius:4px; }
.chat-msg .avatar { font-size:20px; margin-bottom:4px; }
.chat-msg.tutu .avatar { display:block; }
.chat-msg.user .avatar { display:none; }
.chat-trigger { font-size:11px; color:#fbbf24; margin-top:4px; padding:4px 8px; background:rgba(251,191,36,0.1); border-radius:8px; display:inline-block; }

.chat-input-bar { display:flex; gap:8px; padding:12px 16px env(safe-area-inset-bottom); border-top:1px solid #1a1a1a; background:#0a0a0a; }
.chat-input-bar input { flex:1; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:20px; padding:10px 16px; color:#fff; font-size:14px; outline:none; }
.chat-input-bar input::placeholder { color:#555; }
.chat-input-bar button { width:40px; height:40px; border-radius:50%; border:none; background:#fff; color:#000; font-size:16px; cursor:pointer; flex-shrink:0; }
.chat-input-bar button:active { opacity:0.7; }
.chat-input-bar .img-btn { background:#2a2a2a; color:#aaa; font-size:18px; }

.typing-indicator { color:#666; font-size:12px; padding:8px 0; }
</style>
</head>
<body>

<!-- Feed页 -->
<div id="feed-page" class="page active">
  <div class="feed-header"><h1>🍄 小蘑菇秃秃</h1></div>
  <div class="feed-scroll" id="feed-scroll"></div>
</div>

<!-- Chat页 -->
<div id="chat-page" class="page">
  <div class="chat-header"><h2>🍄 小蘑菇秃秃</h2></div>
  <div class="chat-body" id="chat-body"></div>
  <div class="chat-input-bar">
    <button class="img-btn" onclick="sendImage()">📷</button>
    <input id="chat-input" placeholder="跟秃秃说点什么..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- Tab栏 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('feed')">
    <span class="tab-icon">🎬</span>首页
  </div>
  <div class="tab" onclick="switchTab('chat')">
    <span class="tab-icon">💬</span>聊天
  </div>
</div>

<script>
// ============================================================
// Tab切换
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name + '-page').classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'chat') loadChat();
  if (name === 'feed') loadFeed();
}

// ============================================================
// Feed
// ============================================================
let feedLoading = false;
let feedEvents = [];

async function loadFeed() {
  if (feedLoading) return;
  feedLoading = true;
  try {
    const resp = await fetch('/api/feed?limit=20');
    const data = await resp.json();
    feedEvents = data.events || [];
    renderFeed();
  } catch(e) { console.error(e); }
  feedLoading = false;
}

function renderFeed() {
  const container = document.getElementById('feed-scroll');
  if (!feedEvents.length) {
    container.innerHTML = '<div class="feed-empty">秃秃还没有生活记录</div>';
    return;
  }
  container.innerHTML = feedEvents.map((evt, i) => {
    const isUser = evt.user_related;
    const hasVideo = evt.video_status === 'ready' && evt.video_url;
    const dateStr = formatDate(evt.publish_at);

    return `<div class="feed-card">
      ${isUser ? '<div class="feed-badge user">👤 与你有关</div>' : ''}
      <div class="feed-video-wrap">
        ${hasVideo
          ? `<video src="${evt.video_url}" playsinline webkit-playsinline loop muted
               onclick="this.muted=!this.muted; this.paused?this.play():this.pause()"></video>`
          : `<div class="feed-generating"><div class="spinner"></div><span>视频生成中...</span></div>`
        }
      </div>
      <div class="feed-info">
        <div class="feed-time">${dateStr} · ${evt.time}</div>
        <div class="feed-title">${evt.title}</div>
        ${evt.inner_voice ? `<div class="feed-voice">${evt.inner_voice}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  // 自动播放第一个视频
  const firstVideo = container.querySelector('video');
  if (firstVideo) firstVideo.play().catch(()=>{});

  // 滚动时切换视频播放
  setupScrollPlay(container);
}

function setupScrollPlay(container) {
  let currentPlaying = null;
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      if (!video) return;
      if (entry.isIntersecting && entry.intersectionRatio > 0.7) {
        if (currentPlaying && currentPlaying !== video) {
          currentPlaying.pause();
          currentPlaying.currentTime = 0;
        }
        video.play().catch(()=>{});
        currentPlaying = video;
      }
    });
  }, { threshold: [0.7] });

  container.querySelectorAll('.feed-card').forEach(card => observer.observe(card));
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return '今天';
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  if (d.toDateString() === yesterday.toDateString()) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

// ============================================================
// Chat
// ============================================================
let chatLoaded = false;

async function loadChat() {
  if (chatLoaded) return;
  try {
    const resp = await fetch('/api/chat/history?limit=30');
    const data = await resp.json();
    renderChat(data.messages || []);
    chatLoaded = true;
  } catch(e) { console.error(e); }
}

function renderChat(messages) {
  const body = document.getElementById('chat-body');
  body.innerHTML = messages.map(msg => {
    const isTutu = msg.sender === 'tutu';
    return `<div class="chat-msg ${isTutu ? 'tutu' : 'user'}">
      ${isTutu ? '<span class="avatar">🍄</span>' : ''}
      <div class="bubble">${escapeHtml(msg.content)}</div>
      ${msg.triggered_video_id ? '<div class="chat-trigger">📹 秃秃正在做相关的事...</div>' : ''}
    </div>`;
  }).join('');
  body.scrollTop = body.scrollHeight;
}

function appendChatMsg(sender, content, triggeredVideo=false) {
  const body = document.getElementById('chat-body');
  const isTutu = sender === 'tutu';
  const div = document.createElement('div');
  div.className = `chat-msg ${isTutu ? 'tutu' : 'user'}`;
  div.innerHTML = `
    ${isTutu ? '<span class="avatar">🍄</span>' : ''}
    <div class="bubble">${escapeHtml(content)}</div>
    ${triggeredVideo ? '<div class="chat-trigger">📹 秃秃正在做相关的事...</div>' : ''}
  `;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  appendChatMsg('user', text);

  // 显示打字指示
  const body = document.getElementById('chat-body');
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.textContent = '秃秃正在想...';
  body.appendChild(typing);
  body.scrollTop = body.scrollHeight;

  try {
    const resp = await fetch('/api/chat/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ content: text, type: 'text' })
    });
    const data = await resp.json();
    typing.remove();
    appendChatMsg('tutu', data.reply, data.trigger_video);
  } catch(e) {
    typing.remove();
    appendChatMsg('tutu', '嘟...网络不太好的样子');
  }
}

function sendImage() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    appendChatMsg('user', `[发送了一张图片: ${file.name}]`);

    // 简单描述（MVP阶段让用户输入描述）
    const desc = prompt('简单描述一下这张图片（秃秃会看到）：');
    if (!desc) return;

    const body = document.getElementById('chat-body');
    const typing = document.createElement('div');
    typing.className = 'typing-indicator';
    typing.textContent = '秃秃正在看你的图片...';
    body.appendChild(typing);

    try {
      const resp = await fetch('/api/chat/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ content: desc, type: 'image', image_desc: desc })
      });
      const data = await resp.json();
      typing.remove();
      appendChatMsg('tutu', data.reply, data.trigger_video);
    } catch(e) {
      typing.remove();
      appendChatMsg('tutu', '嘟？图片好像看不清...');
    }
  };
  input.click();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 初始化
loadFeed();
</script>
</body>
</html>
