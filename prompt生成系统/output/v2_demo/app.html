<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>秃秃的一天</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#000}
  body{font-family:-apple-system,'PingFang SC',sans-serif;display:flex;justify-content:center}
  .phone{width:393px;height:100vh;position:relative;overflow:hidden;background:#000}

  /* Feed */
  .feed{width:100%;height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
  .feed::-webkit-scrollbar{display:none}
  .slide{width:100%;height:100vh;scroll-snap-align:start;position:relative;background:#000}
  .slide video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
  .slide::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(transparent,rgba(0,0,0,0.75));pointer-events:none}

  /* Top */
  .top-ov{position:absolute;top:0;left:0;right:0;z-index:10;padding:48px 20px 12px;background:linear-gradient(rgba(0,0,0,0.4),transparent)}
  .top-row{display:flex;justify-content:space-between;align-items:center}
  .top-row .nm{color:#fff;font-size:12px;opacity:0.6}
  .top-row .wt{font-size:40px;line-height:1}
  .st-title{color:#fff;font-size:22px;font-weight:700;margin-top:2px}
  .tm-badge{display:inline-block;margin-top:4px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);font-size:11px;padding:3px 10px;border-radius:10px}
  .new-badge{display:inline-block;margin-left:6px;background:linear-gradient(135deg,rgba(108,92,231,0.7),rgba(255,107,107,0.7));color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px}

  .top-row .wt{font-size:40px}

  /* Bottom thoughts */
  .bot-ov{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 16px 84px}
  .th-box{background:rgba(0,0,0,0.25);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:12px 14px}
  .th-label{color:rgba(255,255,255,0.35);font-size:10px;letter-spacing:1px;margin-bottom:6px}
  .th-item{display:flex;gap:8px;margin-bottom:6px}
  .th-item .tt{color:rgba(255,255,255,0.3);font-size:10px;min-width:32px;padding-top:1px}
  .th-item .tb{color:rgba(255,255,255,0.85);font-size:12px;line-height:1.4}
  .triggered{color:rgba(108,92,231,0.7);font-size:10px;margin-top:4px}

  /* Dots */
  .dots{position:fixed;right:8px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:6px}
  .dots .d{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all .3s}
  .dots .d.active{background:#fff;height:14px;border-radius:3px}

  /* Bottom bar */
  .bbar{position:fixed;bottom:0;left:0;right:0;width:393px;margin:0 auto;z-index:60;padding:8px 14px 26px;background:rgba(0,0,0,0.6);backdrop-filter:blur(16px);display:flex;gap:10px;align-items:center}
  .chat-trig{flex:1;background:rgba(255,255,255,0.08);border:none;border-radius:22px;padding:12px 16px;color:rgba(255,255,255,0.45);font-size:13px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px}
  .chat-trig .dot{width:7px;height:7px;background:#ff6b6b;border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .cam{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

  /* Chat panel */
  .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:190}
  .backdrop.show{display:block}
  .cpanel{position:fixed;bottom:0;left:0;right:0;width:393px;height:65vh;margin:0 auto;background:rgba(18,18,18,0.98);backdrop-filter:blur(30px);border-radius:18px 18px 0 0;z-index:200;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.32,.72,0,1);transform:translateY(100%)}
  .cpanel.open{transform:translateY(0)}
  .chandle{text-align:center;padding:8px 0 4px;cursor:pointer}
  .chandle span{display:inline-block;width:34px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px}
  .chdr{padding:2px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.05)}
  .chdr h3{color:#fff;font-size:15px;font-weight:600}
  .chdr .cls{background:none;border:none;color:rgba(255,255,255,0.3);font-size:20px;cursor:pointer;padding:4px 8px}
  .mtags{padding:6px 14px;display:flex;gap:5px;flex-wrap:wrap}
  .mtags .tg{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.35);font-size:10px;padding:2px 7px;border-radius:7px}
  .mtags .tg.nw{background:rgba(108,92,231,0.15);color:rgba(180,160,255,0.8)}
  .cmsgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column}
  .msg{max-width:78%;margin-bottom:8px;display:flex;gap:7px;align-items:flex-end}
  .msg.u{align-self:flex-end;flex-direction:row-reverse}
  .msg.b{align-self:flex-start}
  .msg .av{width:28px;height:28px;border-radius:50%;font-size:16px;text-align:center;line-height:28px;flex-shrink:0}
  .msg .bl{padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.45}
  .msg.u .bl{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);border-bottom-right-radius:4px}
  .msg.b .bl{background:rgba(108,92,231,0.12);color:rgba(255,255,255,0.8);border-bottom-left-radius:4px}
  .msg .ts{font-size:9px;color:rgba(255,255,255,0.15);margin-top:2px}
  .typing{color:rgba(255,255,255,0.25);font-size:12px;padding:4px 0;align-self:flex-start}
  .typing span{animation:blink 1.4s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
  .cinput{padding:8px 12px 24px;border-top:1px solid rgba(255,255,255,0.04);display:flex;gap:8px;align-items:center}
  .cinput input{flex:1;background:rgba(255,255,255,0.06);border:none;border-radius:20px;padding:10px 14px;color:#fff;font-size:13px;outline:none}
  .cinput input::placeholder{color:rgba(255,255,255,0.25)}
  .cinput .snd{width:38px;height:38px;border-radius:50%;background:rgba(108,92,231,0.35);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cinput .snd:active{background:rgba(108,92,231,0.55)}
  .evt-notice{align-self:center;background:rgba(108,92,231,0.15);border-radius:12px;padding:8px 14px;margin:6px 0;text-align:center}
  .evt-notice .en-title{color:rgba(180,160,255,0.9);font-size:12px;font-weight:600}
  .evt-notice .en-sub{color:rgba(255,255,255,0.3);font-size:10px;margin-top:2px}
</style>
</head>
<body>
<div class="phone">
  <div class="feed" id="feed"></div>
  <div class="dots" id="dots"></div>
  <div class="bbar" id="bbar">
    <button class="chat-trig" onclick="openChat()"><span class="dot"></span>有什么想和秃秃说的？</button>
    <button class="cam">📷</button>
  </div>
  <div class="backdrop" id="bk" onclick="closeChat()"></div>
  <div class="cpanel" id="cp">
    <div class="chandle" onclick="closeChat()"><span></span></div>
    <div class="chdr"><h3>🍄 和秃秃聊天</h3><button class="cls" onclick="closeChat()">×</button></div>
    <div class="mtags" id="mt"></div>
    <div class="cmsgs" id="cm">
      <div class="msg b"><div class="av">🍄</div><div><div class="bl">嘟嘟！你来啦～</div></div></div>
    </div>
    <div class="cinput">
      <input type="text" id="ci" placeholder="跟秃秃说点什么..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="snd" onclick="sendChat()">↑</button>
    </div>
  </div>
</div>
<script>
let data=[], allSlides=[], cur=0;

async function init(){
  const r=await fetch('/api/timeline');
  data=await r.json();
  render();
}

function render(){
  const feed=document.getElementById('feed');
  allSlides=[];
  let html='';

  data.forEach((day,di)=>{
    day.slots.forEach(s=>{
      const isNew=s.is_new||false;
      html+=`<div class="slide">
        <video src="${s.video_url}" playsinline muted loop preload="auto"></video>
        <div class="top-ov">
          <div class="top-row"><span class="nm">小蘑菇秃秃</span><span class="wt">${s.weather}</span></div>
          <div class="st-title">${s.title}</div>
          <span class="tm-badge">${day.date} ${s.period} · ${s.time}</span>
          ${isNew?'<span class="new-badge">✨ 因你而起</span>':''}
        </div>
        <div class="bot-ov">
          <div class="th-box">
            <div class="th-label">菇的碎碎念</div>
            ${s.thoughts.map(t=>`<div class="th-item"><span class="tt">${t.time}</span><span class="tb">${t.text}</span></div>`).join('')}
            ${s.triggered_by?`<div class="triggered">💬 因为你说了"${esc(s.triggered_by)}"</div>`:''}
          </div>
        </div>
      </div>`;
      allSlides.push({type:'slide'});
    });
  });

  feed.innerHTML=html;

  // Dots
  const dots=document.getElementById('dots');
  dots.innerHTML=allSlides.map((_,i)=>`<div class="d ${i===0?'active':''}" data-i="${i}"></div>`).join('');

  // Scroll
  feed.addEventListener('scroll',()=>{
    const idx=Math.round(feed.scrollTop/window.innerHeight);
    if(idx!==cur){cur=idx;updDots(idx);updVids(idx);}
  });
  updVids(0);
}

function updDots(i){document.querySelectorAll('.dots .d').forEach((d,j)=>d.classList.toggle('active',j===i))}
function updVids(i){
  document.querySelectorAll('.slide video').forEach((v,j)=>{
    // j offset by date separators
    const slideIdx=allSlides.findIndex((s,k)=>s.type==='slide'&&k===i);
    if(j===getVideoIndex(i)) v.play().catch(()=>{});
    else v.pause();
  });
}
function getVideoIndex(scrollIdx){
  let vi=0;
  for(let k=0;k<scrollIdx;k++){if(allSlides[k].type==='slide')vi++;}
  return allSlides[scrollIdx]?.type==='slide'?vi:-1;
}

// Re-implement video play based on intersection
const obs=new IntersectionObserver(es=>{
  es.forEach(e=>{
    const v=e.target.querySelector('video');
    if(v){if(e.isIntersecting)v.play().catch(()=>{});else v.pause();}
  });
},{threshold:0.6});

// Observe after render
function observeSlides(){document.querySelectorAll('.slide').forEach(s=>obs.observe(s))}

function openChat(){
  document.getElementById('cp').classList.add('open');
  document.getElementById('bk').classList.add('show');
  document.getElementById('bbar').style.display='none';
  setTimeout(()=>document.getElementById('ci').focus(),350);
  loadMem();
}
function closeChat(){
  document.getElementById('cp').classList.remove('open');
  document.getElementById('bk').classList.remove('show');
  document.getElementById('bbar').style.display='flex';
}

async function sendChat(){
  const inp=document.getElementById('ci');
  const msg=inp.value.trim();if(!msg)return;inp.value='';
  const cm=document.getElementById('cm');
  const ts=new Date().toTimeString().slice(0,5);

  cm.innerHTML+=`<div class="msg u"><div><div class="bl">${esc(msg)}</div><div class="ts" style="text-align:right">${ts}</div></div></div>`;
  cm.innerHTML+=`<div class="typing" id="typ">🍄 <span>.</span><span>.</span><span>.</span></div>`;
  cm.scrollTop=cm.scrollHeight;

  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const d=await r.json();
    document.getElementById('typ')?.remove();
    cm.innerHTML+=`<div class="msg b"><div class="av">🍄</div><div><div class="bl">${esc(d.reply)}</div><div class="ts">${ts}</div></div></div>`;
    if(d.new_event){
      cm.innerHTML+=`<div class="evt-notice"><div class="en-title">✨ 秃秃决定去${esc(d.new_event.title)}了</div><div class="en-sub">关掉聊天看看↑</div></div>`;
      // Reload timeline
      const r2=await fetch('/api/timeline');data=await r2.json();render();observeSlides();
    }
    cm.scrollTop=cm.scrollHeight;
    if(d.memory)updMem(d.memory);
  }catch(e){
    document.getElementById('typ')?.remove();
    cm.innerHTML+=`<div class="msg b"><div class="av">🍄</div><div><div class="bl">嘟？</div></div></div>`;
  }
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function loadMem(){try{const r=await fetch('/api/memory');updMem(await r.json())}catch(e){}}
function updMem(m){
  const el=document.getElementById('mt');
  let h=`<span class="tg">🍄 ${m.nickname}</span>`;
  m.preferences.forEach(p=>{h+=`<span class="tg">${p}</span>`});
  if(m.key_moments.length)h+=`<span class="tg nw">${m.key_moments[m.key_moments.length-1]}</span>`;
  el.innerHTML=h;
}

init().then(()=>setTimeout(observeSlides,100));
</script>
</body>
</html>
